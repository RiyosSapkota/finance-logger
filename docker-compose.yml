services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_WEBHOOK_URL=YOUR_NGROK_URL
      - WEBHOOK_URL=YOUR_NGROK_URL
    volumes:
      - n8n_data:/home/node/.n8n

  metabase:
    image: metabase/metabase
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data

volumes:
  n8n_data:
  metabase_data: